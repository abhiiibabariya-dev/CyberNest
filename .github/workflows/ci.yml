name: CyberNest CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check manager/ parser/ correlator/ alert_manager/ soar/ threat_intel/ indexer/ --select E,F,W --ignore E501

  test-parser:
    name: Test Parser
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -r parser/requirements.txt
          pip install pytest pytest-asyncio
      - name: Run parser tests
        run: pytest parser/tests/ -v --tb=short

  test-correlator:
    name: Test Correlator
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -r correlator/requirements.txt
          pip install pytest pytest-asyncio
      - name: Run correlator tests
        run: pytest correlator/tests/ -v --tb=short

  test-dashboard:
    name: Test Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: dashboard
        run: npm ci
      - name: Type check
        working-directory: dashboard
        run: npx tsc --noEmit
      - name: Build
        working-directory: dashboard
        run: npm run build

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-parser, test-correlator, test-dashboard]
    strategy:
      matrix:
        service:
          - manager
          - parser
          - correlator
          - alert_manager
          - soar
          - indexer
          - threat_intel
          - dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: cybernest-${{ matrix.service }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-registry:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        service:
          - manager
          - parser
          - correlator
          - alert_manager
          - soar
          - indexer
          - threat_intel
          - dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cybernest-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/cybernest-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
