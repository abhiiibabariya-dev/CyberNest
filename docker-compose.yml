version: "3.9"

x-common-env: &common-env
  KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
  ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB:-cybernest}
  POSTGRES_USER: ${POSTGRES_USER:-cybernest}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CyberNest2025!}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  TZ: ${TZ:-UTC}

services:
  # ---------- Infrastructure ----------

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cybernest-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT:-2181}
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cybernest

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cybernest-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_CLIENT_PORT:-2181}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT:-9093}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-168}
      KAFKA_LOG_RETENTION_BYTES: ${KAFKA_LOG_RETENTION_BYTES:-1073741824}
      KAFKA_MESSAGE_MAX_BYTES: ${KAFKA_MESSAGE_MAX_BYTES:-10485760}
      KAFKA_NUM_PARTITIONS: 6
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 60s
    networks:
      - cybernest

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cybernest-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for Kafka to be fully ready..."
        sleep 5

        declare -A TOPICS
        TOPICS["cybernest.raw.windows"]=6
        TOPICS["cybernest.raw.linux"]=6
        TOPICS["cybernest.raw.network"]=6
        TOPICS["cybernest.raw.cloud"]=6
        TOPICS["cybernest.raw.application"]=6
        TOPICS["cybernest.parsed.events"]=6
        TOPICS["cybernest.alerts"]=3
        TOPICS["cybernest.correlation"]=3
        TOPICS["cybernest.dead.letter"]=1

        for TOPIC in "$${!TOPICS[@]}"; do
          PARTITIONS=$${TOPICS[$$TOPIC]}
          echo "Creating topic $$TOPIC with $$PARTITIONS partitions..."
          kafka-topics --create \
            --if-not-exists \
            --bootstrap-server kafka:9092 \
            --topic "$$TOPIC" \
            --partitions "$$PARTITIONS" \
            --replication-factor 1 \
            --config retention.ms=${KAFKA_TOPIC_RETENTION_MS:-604800000} \
            --config cleanup.policy=delete
        done

        echo "All topics created successfully."
        kafka-topics --list --bootstrap-server kafka:9092
    networks:
      - cybernest

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: cybernest-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms${ES_HEAP_SIZE:-1g} -Xmx${ES_HEAP_SIZE:-1g}
      - cluster.name=${ES_CLUSTER_NAME:-cybernest}
      - bootstrap.memory_lock=true
      - xpack.ml.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - cybernest

  redis:
    image: redis:7.2-alpine
    container_name: cybernest-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --save 300 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cybernest

  postgres:
    image: postgres:15-alpine
    container_name: cybernest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cybernest}
      POSTGRES_USER: ${POSTGRES_USER:-cybernest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CyberNest2025!}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cybernest} -d ${POSTGRES_DB:-cybernest}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cybernest

  # ---------- CyberNest Services ----------

  cybernest-manager:
    build:
      context: ./manager
      dockerfile: Dockerfile
    container_name: cybernest-manager
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "${MANAGER_PORT:-5000}:5000"
    environment:
      <<: *common-env
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-cybernest-2025}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-change-me-cybernest-2025}
      JWT_ACCESS_TOKEN_EXPIRES: ${JWT_ACCESS_TOKEN_EXPIRES:-3600}
      JWT_REFRESH_TOKEN_EXPIRES: ${JWT_REFRESH_TOKEN_EXPIRES:-86400}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cybernest

  cybernest-syslog:
    build:
      context: ./manager
      dockerfile: Dockerfile
    container_name: cybernest-syslog
    restart: unless-stopped
    command: python receiver/syslog_receiver.py
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${SYSLOG_UDP_PORT:-514}:514/udp"
      - "${SYSLOG_TCP_PORT:-601}:601/tcp"
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.connect(('127.0.0.1', 601)); s.close()\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - cybernest

  cybernest-parser:
    build:
      context: ./parser
      dockerfile: Dockerfile
    container_name: cybernest-parser
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      PARSER_BATCH_SIZE: ${PARSER_BATCH_SIZE:-100}
      PARSER_BATCH_TIMEOUT_MS: ${PARSER_BATCH_TIMEOUT_MS:-5000}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cybernest

  cybernest-correlator:
    build:
      context: ./correlator
      dockerfile: Dockerfile
    container_name: cybernest-correlator
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      CORRELATION_WINDOW_SECONDS: ${CORRELATION_WINDOW_SECONDS:-300}
      CORRELATION_BATCH_SIZE: ${CORRELATION_BATCH_SIZE:-50}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cybernest

  cybernest-alert-manager:
    build:
      context: ./alert_manager
      dockerfile: Dockerfile
    container_name: cybernest-alert-manager
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      <<: *common-env
      ALERT_DEDUP_WINDOW_SECONDS: ${ALERT_DEDUP_WINDOW_SECONDS:-300}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cybernest

  cybernest-soar:
    build:
      context: ./soar
      dockerfile: Dockerfile
    container_name: cybernest-soar
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      SOAR_MAX_CONCURRENT_PLAYBOOKS: ${SOAR_MAX_CONCURRENT_PLAYBOOKS:-10}
      SOAR_STEP_TIMEOUT_SECONDS: ${SOAR_STEP_TIMEOUT_SECONDS:-300}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cybernest

  cybernest-indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: cybernest-indexer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      <<: *common-env
      INDEXER_BATCH_SIZE: ${INDEXER_BATCH_SIZE:-500}
      INDEXER_FLUSH_INTERVAL_SECONDS: ${INDEXER_FLUSH_INTERVAL_SECONDS:-5}
      ES_INDEX_PREFIX: ${ES_INDEX_PREFIX:-cybernest}
      ES_INDEX_SHARDS: ${ES_INDEX_SHARDS:-1}
      ES_INDEX_REPLICAS: ${ES_INDEX_REPLICAS:-0}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cybernest

  cybernest-threat-intel:
    build:
      context: ./threat_intel
      dockerfile: Dockerfile
    container_name: cybernest-threat-intel
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      THREAT_INTEL_FETCH_INTERVAL_HOURS: ${THREAT_INTEL_FETCH_INTERVAL_HOURS:-6}
      ABUSE_IPDB_API_KEY: ${ABUSE_IPDB_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      OTX_API_KEY: ${OTX_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cybernest

  cybernest-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: cybernest-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
      REACT_APP_WS_URL: ${REACT_APP_WS_URL:-/ws}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cybernest

  nginx:
    image: nginx:alpine
    container_name: cybernest-nginx
    restart: unless-stopped
    depends_on:
      cybernest-manager:
        condition: service_healthy
      cybernest-dashboard:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/cybernest.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - cybernest

volumes:
  zk_data:
    driver: local
  zk_log:
    driver: local
  kafka_data:
    driver: local
  es_data:
    driver: local
  redis_data:
    driver: local
  pg_data:
    driver: local

networks:
  cybernest:
    driver: bridge
    name: cybernest-network
