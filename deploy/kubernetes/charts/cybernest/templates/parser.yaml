apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-parser
  labels:
    app.kubernetes.io/name: cybernest-parser
spec:
  replicas: {{ .Values.parser.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: cybernest-parser
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cybernest-parser
    spec:
      containers:
        - name: parser
          image: "{{ .Values.parser.image }}:{{ .Values.global.imageTag }}"
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "{{ .Release.Name }}-kafka:9092"
            - name: ELASTICSEARCH_URL
              value: "http://{{ .Release.Name }}-elasticsearch:9200"
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379/0"
          resources:
            {{- toYaml .Values.parser.resources | nindent 12 }}
{{- if .Values.parser.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-parser
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-parser
  minReplicas: {{ .Values.parser.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.parser.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.parser.autoscaling.targetCPUUtilization }}
{{- end }}
