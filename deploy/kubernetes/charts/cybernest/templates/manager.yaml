apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-manager
  labels:
    app.kubernetes.io/name: cybernest-manager
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.manager.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: cybernest-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cybernest-manager
    spec:
      containers:
        - name: manager
          image: "{{ .Values.manager.image }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.manager.port }}
          env:
            - name: POSTGRES_HOST
              value: "{{ .Release.Name }}-postgresql"
            - name: POSTGRES_DB
              value: "{{ .Values.postgresql.auth.database }}"
            - name: POSTGRES_USER
              value: "{{ .Values.postgresql.auth.username }}"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: postgres-password
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379/0"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "{{ .Release.Name }}-kafka:9092"
            - name: ELASTICSEARCH_URL
              value: "http://{{ .Release.Name }}-elasticsearch:9200"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: jwt-secret
          resources:
            {{- toYaml .Values.manager.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.manager.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.manager.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-manager
spec:
  selector:
    app.kubernetes.io/name: cybernest-manager
  ports:
    - port: {{ .Values.manager.port }}
      targetPort: {{ .Values.manager.port }}
