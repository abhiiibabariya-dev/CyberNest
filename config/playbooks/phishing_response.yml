name: Phishing Email Response
description: >
  Automated response to phishing email alerts. Checks sender domain WHOIS,
  looks up URLs and attachments on VirusTotal, blocks malicious domains,
  and creates an investigation case.
enabled: true

trigger:
  severity: [medium, high, critical]
  category: phishing

steps:
  - name: WHOIS Lookup on Sender Domain
    action: whois_lookup
    input:
      domain: "{{alert.email_sender_domain}}"
    output: whois_result
    on_failure: continue
    timeout: 30

  - name: VirusTotal Domain Check
    action: virustotal_lookup
    input:
      target: "{{alert.email_sender_domain}}"
      type: domain
    output: vt_domain_result
    on_failure: continue
    timeout: 30

  - name: VirusTotal URL Check
    action: virustotal_lookup
    condition: "{{alert.url is defined}}"
    input:
      target: "{{alert.url}}"
      type: url
    output: vt_url_result
    on_failure: continue
    timeout: 30

  - name: VirusTotal Attachment Hash Check
    action: virustotal_lookup
    condition: "{{alert.file_hash is defined}}"
    input:
      target: "{{alert.file_hash}}"
      type: hash
    output: vt_attachment_result
    on_failure: continue
    timeout: 30

  - name: AbuseIPDB Check on Sender IP
    action: abuseipdb_check
    condition: "{{alert.source_ip is defined}}"
    input:
      ip: "{{alert.source_ip}}"
    output: abuse_result
    on_failure: continue
    timeout: 30

  - name: Block Malicious Sender Domain
    action: firewall_block_ip
    condition: "{{vt_domain_result.malicious > 0 or vt_url_result.malicious > 0}}"
    input:
      ip: "{{alert.email_sender_domain}}"
      duration: 2592000
      firewall_type: generic
    output: block_result
    on_failure: continue
    timeout: 30

  - name: Create Phishing Investigation Case
    action: create_case
    input:
      title: "Phishing Email from {{alert.email_sender_domain}}"
      description: >
        Phishing email detected.
        Sender: {{alert.email_sender}}.
        Domain: {{alert.email_sender_domain}}.
        Subject: {{alert.email_subject}}.
        Domain age: {{whois_result.creation_date}}.
        VT Domain: {{vt_domain_result.malicious}}/{{vt_domain_result.total}}.
        Recipients may need notification.
      severity: medium
      tags:
        - phishing
        - T1566
        - email-security
    output: case_result
    on_failure: continue
    timeout: 15

  - name: Notify SOC
    action: slack_notify
    input:
      message: |
        :email: *PHISHING EMAIL DETECTED*

        *Sender:* `{{alert.email_sender}}`
        *Domain:* `{{alert.email_sender_domain}}`
        *Subject:* {{alert.email_subject}}

        *Analysis:*
        - Domain Age: {{whois_result.creation_date}}
        - VT Domain Score: {{vt_domain_result.malicious}}/{{vt_domain_result.total}}
        - VT URL Score: {{vt_url_result.malicious}}/{{vt_url_result.total}}
        - AbuseIPDB: {{abuse_result.score}}%

        *Case:* {{case_result.case_id}}
    output: slack_result
    on_failure: continue
    timeout: 10
