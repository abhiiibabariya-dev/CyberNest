name: phishing_response
description: >
  Automated response to phishing email alerts. Checks the sender domain WHOIS
  data, scans extracted URLs on VirusTotal, blocks the sender, creates a
  case, and notifies the security team via email.
enabled: true

trigger:
  rule_id: CN-EMAIL-*
  severity:
    - medium
    - high
    - critical
  category: phishing

steps:
  - name: sender_whois
    action: whois_lookup
    input:
      domain: "{{ alert.parsed_event.sender_domain | default(alert.parsed_event.from_domain | default('')) }}"
    output: whois_result
    condition: >
      alert.parsed_event is not none
      and (alert.parsed_event.sender_domain | default(alert.parsed_event.from_domain | default(''))) != ''
    on_failure: continue
    retry_count: 2
    timeout: 30

  - name: vt_url_scan
    action: virustotal_lookup
    input:
      target: "{{ alert.parsed_event.url | default(alert.parsed_event.suspicious_url | default('')) }}"
      type: url
    output: vt_url_result
    condition: >
      alert.parsed_event is not none
      and (alert.parsed_event.url | default(alert.parsed_event.suspicious_url | default(''))) != ''
    on_failure: continue
    retry_count: 2
    timeout: 30

  - name: block_sender
    action: firewall_block_ip
    input:
      ip: "{{ alert.parsed_event.sender_ip | default(alert.source_ip | default('')) }}"
      duration: 604800
      firewall_type: generic
      reason: "Phishing sender blocked - {{ alert.rule_id }}: {{ alert.parsed_event.subject | default(alert.title) }}"
    output: block_result
    condition: >
      (alert.parsed_event.sender_ip | default(alert.source_ip | default(''))) != ''
      and ((vt_url_result.output.malicious | default(0)) > 0
           or alert.severity in ['high', 'critical'])
    on_failure: continue
    retry_count: 1
    timeout: 30

  - name: create_phishing_case
    action: create_case
    input:
      title: "[Phishing] {{ alert.title }}"
      description: >
        Phishing email detected.
        Subject: {{ alert.parsed_event.subject | default('N/A') }}.
        Sender: {{ alert.parsed_event.from_address | default('N/A') }}.
        Sender domain: {{ alert.parsed_event.sender_domain | default('N/A') }}.
        Domain registered: {{ whois_result.output.creation_date | default('N/A') }}.
        Domain registrar: {{ whois_result.output.registrar | default('N/A') }}.
        Suspicious URL: {{ alert.parsed_event.url | default('N/A') }}.
        VT URL malicious: {{ vt_url_result.output.malicious | default('N/A') }}.
        Recipients affected: {{ alert.parsed_event.recipient_count | default('N/A') }}.
      severity: "{{ alert.severity }}"
      tags:
        - phishing
        - email-security
        - soar-automated
    output: case_result
    on_failure: continue
    retry_count: 1
    timeout: 15

  - name: notify_security_team
    action: email_notify
    input:
      to: "security-team@company.com"
      subject: "[CyberNest] Phishing Alert - {{ alert.parsed_event.subject | default(alert.title) }}"
      message: >
        A phishing email has been detected and automatically processed.

        Alert: {{ alert.title }}
        Severity: {{ alert.severity }}
        Sender: {{ alert.parsed_event.from_address | default('N/A') }}
        Subject: {{ alert.parsed_event.subject | default('N/A') }}

        WHOIS Analysis:
        - Domain Registrar: {{ whois_result.output.registrar | default('N/A') }}
        - Domain Created: {{ whois_result.output.creation_date | default('N/A') }}
        - Domain Country: {{ whois_result.output.country | default('N/A') }}

        URL Analysis:
        - VT Malicious: {{ vt_url_result.output.malicious | default('N/A') }}
        - VT Permalink: {{ vt_url_result.output.permalink | default('N/A') }}

        Actions Taken:
        - Sender Blocked: {{ block_result.output.message | default('Skipped') }}
        - Case Created: {{ case_result.output.case_id | default('N/A') }}

        Please review the case for further investigation.
    output: email_result
    on_failure: continue
    timeout: 30
