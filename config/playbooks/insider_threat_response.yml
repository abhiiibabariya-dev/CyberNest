name: Insider Threat / Data Exfiltration Response
description: >
  Automated response to data exfiltration and insider threat alerts.
  Monitors for large outbound transfers, unusual access patterns, and
  privilege abuse. Enriches context and creates investigation case.
enabled: true

trigger:
  severity: [high, critical]
  category: exfiltration

steps:
  - name: Check Destination IP Reputation
    action: abuseipdb_check
    condition: "{{alert.destination_ip is defined}}"
    input:
      ip: "{{alert.destination_ip}}"
    output: abuse_dst_result
    on_failure: continue
    timeout: 30

  - name: Shodan Lookup on Destination
    action: shodan_lookup
    condition: "{{alert.destination_ip is defined}}"
    input:
      ip: "{{alert.destination_ip}}"
    output: shodan_dst_result
    on_failure: continue
    timeout: 30

  - name: VirusTotal Destination Check
    action: virustotal_lookup
    condition: "{{alert.destination_ip is defined}}"
    input:
      target: "{{alert.destination_ip}}"
      type: ip
    output: vt_dst_result
    on_failure: continue
    timeout: 30

  - name: Block Exfiltration Destination
    action: firewall_block_ip
    condition: "{{vt_dst_result.malicious > 0 or abuse_dst_result.score > 30}}"
    input:
      ip: "{{alert.destination_ip}}"
      duration: 604800
      firewall_type: generic
    output: block_result
    on_failure: continue
    timeout: 30

  - name: Disable Compromised User Account
    action: ad_disable_user
    condition: "{{alert.severity == 'critical' and alert.username is defined}}"
    input:
      username: "{{alert.username}}"
    output: disable_result
    on_failure: continue
    timeout: 60

  - name: Isolate Source Endpoint
    action: isolate_endpoint
    condition: "{{alert.severity == 'critical' and alert.agent_id is defined}}"
    input:
      agent_id: "{{alert.agent_id}}"
    output: isolate_result
    on_failure: continue
    timeout: 60

  - name: Create Investigation Case
    action: create_case
    input:
      title: "Data Exfiltration — {{alert.username}} on {{alert.hostname}}"
      description: >
        Potential data exfiltration detected.
        User: {{alert.username}} on {{alert.hostname}}.
        Destination: {{alert.destination_ip}}:{{alert.destination_port}}.
        Data transferred: {{alert.bytes_out}} bytes.
        AbuseIPDB score: {{abuse_dst_result.score}}%.
        VT score: {{vt_dst_result.malicious}}/{{vt_dst_result.total}}.
      severity: critical
      tags:
        - data-exfiltration
        - insider-threat
        - T1041
        - automated-response
    output: case_result
    on_failure: abort
    timeout: 15

  - name: Create JIRA Ticket for Legal/HR
    action: jira_ticket
    condition: "{{alert.severity == 'critical'}}"
    input:
      project: SEC
      summary: "Insider Threat Investigation — {{alert.username}}"
      description: >
        Data exfiltration alert for user {{alert.username}}.
        {{alert.bytes_out}} bytes transferred to {{alert.destination_ip}}.
        CyberNest Case: {{case_result.case_id}}.
        Requires legal/HR review.
      priority: High
      labels:
        - insider-threat
        - security-incident
    output: jira_result
    on_failure: continue
    timeout: 30

  - name: Notify SOC — Critical Exfiltration
    action: slack_notify
    input:
      message: |
        :rotating_light: *DATA EXFILTRATION DETECTED*

        *User:* `{{alert.username}}`
        *Host:* `{{alert.hostname}}` ({{alert.agent_id}})
        *Destination:* `{{alert.destination_ip}}:{{alert.destination_port}}`
        *Data Volume:* {{alert.bytes_out}} bytes

        *Threat Intel:*
        - AbuseIPDB: {{abuse_dst_result.score}}%
        - VT: {{vt_dst_result.malicious}}/{{vt_dst_result.total}}
        - Shodan: {{shodan_dst_result.ports}}

        *Actions Taken:*
        - Destination IP blocked
        - User account disabled (if critical)
        - Endpoint isolated (if critical)

        *Case:* {{case_result.case_id}}
        *JIRA:* {{jira_result.issue_key}}
    output: slack_result
    on_failure: continue
    timeout: 10
