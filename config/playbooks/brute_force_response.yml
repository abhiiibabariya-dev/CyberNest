name: Brute Force Automatic Response
description: >
  Automatically responds to brute force attack alerts by enriching the source IP
  with threat intelligence, blocking the IP if found malicious, creating an incident
  case, and notifying the SOC team.
enabled: true

trigger:
  rule_id: CN-WIN-AUTH-002
  severity: [high, critical]
  category: authentication

steps:
  - name: Lookup IP on VirusTotal
    action: virustotal_lookup
    input:
      target: "{{alert.source_ip}}"
      type: ip
    output: vt_result
    on_failure: continue
    timeout: 30
    retry_count: 2

  - name: Check AbuseIPDB Reputation
    action: abuseipdb_check
    input:
      ip: "{{alert.source_ip}}"
    output: abuse_result
    on_failure: continue
    timeout: 30
    retry_count: 2

  - name: Shodan Host Recon
    action: shodan_lookup
    input:
      ip: "{{alert.source_ip}}"
    output: shodan_result
    on_failure: continue
    timeout: 30

  - name: Block IP if Malicious
    action: firewall_block_ip
    condition: "{{vt_result.malicious > 0 or abuse_result.score > 50}}"
    input:
      ip: "{{alert.source_ip}}"
      duration: 86400
      firewall_type: generic
    output: block_result
    on_failure: continue
    timeout: 30

  - name: Create Incident Case
    action: create_case
    input:
      title: "Brute Force Attack from {{alert.source_ip}}"
      description: >
        Brute force detected by rule {{alert.rule_id}}.
        Source: {{alert.source_ip}} targeting {{alert.username}}.
        VT malicious: {{vt_result.malicious}}/{{vt_result.total}}.
        AbuseIPDB score: {{abuse_result.score}}%.
      severity: high
      tags:
        - brute-force
        - T1110
        - automated-response
    output: case_result
    on_failure: continue
    timeout: 15

  - name: Notify SOC Team
    action: slack_notify
    input:
      message: |
        :rotating_light: *BRUTE FORCE DETECTED & AUTO-RESPONDED*

        *Rule:* {{alert.rule_name}}
        *Source IP:* `{{alert.source_ip}}`
        *Target User:* {{alert.username}}
        *Hostname:* {{alert.hostname}}

        *Threat Intel:*
        - VirusTotal: {{vt_result.malicious}}/{{vt_result.total}} detections
        - AbuseIPDB: {{abuse_result.score}}% confidence
        - Shodan Open Ports: {{shodan_result.ports}}

        *Action Taken:* IP Blocked for 24h
        *Case:* {{case_result.case_id}}
    output: slack_result
    on_failure: continue
    timeout: 10
