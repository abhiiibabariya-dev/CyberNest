title: SQL Injection Attempt in Web Logs
id: sigma-sqli
status: stable
level: high
description: Detects SQL injection patterns in web server access logs
logsource:
  category: webserver
  product: any
detection:
  selection:
    url.path|contains:
      - "' OR "
      - "\" OR "
      - "UNION SELECT"
      - "union select"
      - "1=1"
      - "DROP TABLE"
      - "INSERT INTO"
      - "--"
      - "/*"
      - "xp_cmdshell"
      - "WAITFOR DELAY"
  condition: selection
tags:
  - attack.initial_access
  - attack.t1190
falsepositives:
  - Security scanners

---

title: Directory Traversal Attempt
id: sigma-dir-traversal
status: stable
level: high
description: Detects directory traversal patterns in web requests
logsource:
  category: webserver
  product: any
detection:
  selection:
    url.path|contains:
      - "../"
      - "..%2f"
      - "..%5c"
      - "..../"
      - "/etc/passwd"
      - "/etc/shadow"
      - "\\windows\\system32"
  condition: selection
tags:
  - attack.initial_access
  - attack.t1190
falsepositives:
  - Vulnerability scanners
