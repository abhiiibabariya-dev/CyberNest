title: LSASS Memory Dump via Procdump
id: sigma-lsass-procdump
status: stable
level: critical
description: Detects LSASS memory dump using procdump or similar tools
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - "lsass"
      - "procdump"
      - "comsvcs.dll"
      - "MiniDump"
  condition: selection
tags:
  - attack.credential_access
  - attack.t1003.001
falsepositives:
  - Legitimate admin debugging

---

title: Mimikatz Execution Detected
id: sigma-mimikatz
status: stable
level: critical
description: Detects Mimikatz execution patterns in process creation logs
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - "sekurlsa"
      - "kerberos::list"
      - "kerberos::ptt"
      - "lsadump"
      - "privilege::debug"
      - "token::elevate"
  condition: selection
tags:
  - attack.credential_access
  - attack.t1003
falsepositives:
  - Security testing with authorization

---

title: DCSync Attack Detected
id: sigma-dcsync
status: stable
level: critical
description: Detects potential DCSync attack via directory service replication
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4662
    Properties|contains:
      - "1131f6aa-9c07-11d1-f79f-00c04fc2dcd2"
      - "1131f6ad-9c07-11d1-f79f-00c04fc2dcd2"
  condition: selection
tags:
  - attack.credential_access
  - attack.t1003.006
falsepositives:
  - Legitimate AD replication

---

title: Kerberoasting Service Ticket Request
id: sigma-kerberoasting
status: stable
level: high
description: Detects potential Kerberoasting via RC4 service ticket requests
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4769
    TicketEncryptionType: "0x17"
    ServiceName|endswith:
      - "$"
  filter:
    ServiceName: "krbtgt"
  condition: selection and not filter
tags:
  - attack.credential_access
  - attack.t1558.003
falsepositives:
  - Legacy applications using RC4

---

title: Pass-the-Hash Logon
id: sigma-pth
status: stable
level: high
description: Detects Pass-the-Hash via NTLM authentication with specific logon process
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4624
    LogonType: 9
    LogonProcessName: "seclogo"
    AuthenticationPackageName: "Negotiate"
  condition: selection
tags:
  - attack.lateral_movement
  - attack.t1550.002
falsepositives:
  - Unknown
