rules:
  - id: CN-LNX-AUTH-001
    name: SSH Failed Login Attempt
    description: A single SSH failed login attempt was detected on a Linux host.
    level: informational
    category: authentication
    mitre_tactic: TA0006
    mitre_technique:
      - T1110
    enabled: true
    conditions:
      logic: and
      fields:
        - field: event.outcome
          operator: equals
          value: failure
        - field: event.category
          operator: contains
          value: authentication
        - field: event.action
          operator: in
          value:
            - ssh_failed
            - ssh_login
            - sshd
            - failed-login
        - field: host.os.platform
          operator: equals
          value: linux

  - id: CN-LNX-AUTH-002
    name: SSH Brute Force Attack
    description: More than 5 failed SSH login attempts from the same source IP within 60 seconds, indicating a brute force attack.
    level: high
    category: authentication
    mitre_tactic: TA0006
    mitre_technique:
      - T1110.001
    enabled: true
    conditions:
      logic: and
      fields:
        - field: event.outcome
          operator: equals
          value: failure
        - field: event.category
          operator: contains
          value: authentication
        - field: host.os.platform
          operator: equals
          value: linux
    threshold:
      field: source.ip
      count: 5
      timeframe: 60

  - id: CN-LNX-AUTH-003
    name: SSH Successful Login After Failures
    description: A successful SSH login occurred after multiple failed attempts from the same source, indicating a potential brute force success.
    level: high
    category: authentication
    mitre_tactic: TA0006
    mitre_technique:
      - T1110
    enabled: true
    conditions:
      logic: and
      fields:
        - field: event.outcome
          operator: equals
          value: success
        - field: event.action
          operator: in
          value:
            - ssh_login
            - sshd
            - accepted
        - field: host.os.platform
          operator: equals
          value: linux

  - id: CN-LNX-AUTH-004
    name: Root SSH Login Detected
    description: A direct SSH login as root was detected. Root SSH access should be disabled in production environments.
    level: critical
    category: authentication
    mitre_tactic: TA0001
    mitre_technique:
      - T1078.003
    enabled: true
    conditions:
      logic: and
      fields:
        - field: user.name
          operator: equals
          value: root
        - field: event.outcome
          operator: equals
          value: success
        - field: event.action
          operator: in
          value:
            - ssh_login
            - sshd
            - accepted
        - field: host.os.platform
          operator: equals
          value: linux

  - id: CN-LNX-AUTH-005
    name: Su to Root Executed
    description: A user switched to the root account using the su command, which may indicate privilege escalation.
    level: medium
    category: authentication
    mitre_tactic: TA0004
    mitre_technique:
      - T1548.003
    enabled: true
    conditions:
      logic: and
      fields:
        - field: process.name
          operator: equals
          value: su
        - field: user.effective.name
          operator: equals
          value: root
        - field: host.os.platform
          operator: equals
          value: linux

  - id: CN-LNX-AUTH-006
    name: Sudo Command Executed
    description: A user executed a command with sudo privileges on a Linux system.
    level: informational
    category: authentication
    mitre_tactic: TA0004
    mitre_technique:
      - T1548.003
    enabled: true
    conditions:
      logic: and
      fields:
        - field: process.name
          operator: equals
          value: sudo
        - field: event.outcome
          operator: equals
          value: success
        - field: host.os.platform
          operator: equals
          value: linux

  - id: CN-LNX-AUTH-007
    name: Sudo Authentication Failure
    description: A sudo authentication failure was detected, which may indicate an unauthorized user attempting to escalate privileges.
    level: medium
    category: authentication
    mitre_tactic: TA0004
    mitre_technique:
      - T1548.003
    enabled: true
    conditions:
      logic: and
      fields:
        - field: process.name
          operator: equals
          value: sudo
        - field: event.outcome
          operator: equals
          value: failure
        - field: host.os.platform
          operator: equals
          value: linux
