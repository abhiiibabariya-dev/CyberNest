rules:
  - id: CN-WIN-CRED-001
    name: LSASS Memory Access Detected
    description: A process accessed LSASS memory, commonly used by credential dumping tools like Mimikatz to extract passwords and hashes.
    level: critical
    category: credential_access
    mitre_tactic: TA0006
    mitre_technique:
      - T1003.001
    enabled: true
    conditions:
      logic: and
      fields:
        - field: process.name
          operator: not_equals
          value: lsass.exe
        - field: event.action
          operator: in
          value:
            - process-access
            - "10"
            - open-process
        - field: process.target.name
          operator: equals
          value: lsass.exe

  - id: CN-WIN-CRED-002
    name: SAM Registry Hive Access
    description: The SAM registry hive was accessed or exported, potentially to extract local account password hashes.
    level: high
    category: credential_access
    mitre_tactic: TA0006
    mitre_technique:
      - T1003.002
    enabled: true
    conditions:
      logic: and
      fields:
        - field: process.command_line
          operator: regex
          value: (?i)(reg\s+save|reg\s+export).*\\\\sam
        - field: host.os.platform
          operator: equals
          value: windows

  - id: CN-WIN-CRED-003
    name: DCSync Attack Detected
    description: Directory replication privileges were used from a non-domain controller host, indicating a DCSync credential theft attack.
    level: critical
    category: credential_access
    mitre_tactic: TA0006
    mitre_technique:
      - T1003.006
    enabled: true
    conditions:
      logic: and
      fields:
        - field: event.action
          operator: in
          value:
            - directory-service-access
            - "4662"
        - field: event.code
          operator: in
          value:
            - "4662"
            - directory-replication
        - field: host.os.platform
          operator: equals
          value: windows

  - id: CN-WIN-CRED-004
    name: Kerberoasting Activity Detected
    description: Suspicious Kerberos TGS ticket requests were detected for service accounts, indicating a Kerberoasting attack to offline crack service account passwords.
    level: high
    category: credential_access
    mitre_tactic: TA0006
    mitre_technique:
      - T1558.003
    enabled: true
    conditions:
      logic: and
      fields:
        - field: event.action
          operator: in
          value:
            - kerberos-ticket-request
            - "4769"
        - field: event.code
          operator: equals
          value: "4769"
        - field: host.os.platform
          operator: equals
          value: windows
    threshold:
      field: user.name
      count: 5
      timeframe: 60

  - id: CN-WIN-CRED-005
    name: AS-REP Roasting Activity Detected
    description: Kerberos authentication requests without pre-authentication were detected, indicating AS-REP Roasting to crack user passwords offline.
    level: high
    category: credential_access
    mitre_tactic: TA0006
    mitre_technique:
      - T1558.004
    enabled: true
    conditions:
      logic: and
      fields:
        - field: event.action
          operator: in
          value:
            - kerberos-authentication
            - "4768"
        - field: event.code
          operator: equals
          value: "4768"
        - field: host.os.platform
          operator: equals
          value: windows
    threshold:
      field: source.ip
      count: 10
      timeframe: 120

  - id: CN-WIN-CRED-006
    name: Golden Ticket Usage Detected
    description: A Kerberos TGT with an anomalously long lifetime was detected, suggesting the use of a forged Golden Ticket for persistence.
    level: critical
    category: credential_access
    mitre_tactic: TA0006
    mitre_technique:
      - T1558.001
    enabled: true
    conditions:
      logic: and
      fields:
        - field: event.action
          operator: in
          value:
            - kerberos-ticket-request
            - "4768"
            - "4769"
        - field: message
          operator: regex
          value: (?i)(ticket.*lifetime|golden.*ticket|krbtgt)
        - field: host.os.platform
          operator: equals
          value: windows

  - id: CN-WIN-CRED-007
    name: Pass-the-Hash Attack Detected
    description: NTLM authentication with a logon type indicative of pass-the-hash was detected, where an attacker uses a stolen NTLM hash to authenticate.
    level: critical
    category: credential_access
    mitre_tactic: TA0008
    mitre_technique:
      - T1550.002
    enabled: true
    conditions:
      logic: and
      fields:
        - field: event.action
          operator: in
          value:
            - logon
            - "4624"
        - field: message
          operator: regex
          value: (?i)(logon\s*type.*9|ntlm.*network|seclogo.*ntlm)
        - field: host.os.platform
          operator: equals
          value: windows

  - id: CN-WIN-CRED-008
    name: Password Spray Attack on Windows
    description: Multiple failed authentication attempts targeting many user accounts from a single source within a short time frame, characteristic of a password spray attack.
    level: high
    category: credential_access
    mitre_tactic: TA0006
    mitre_technique:
      - T1110.003
    enabled: true
    conditions:
      logic: and
      fields:
        - field: event.outcome
          operator: equals
          value: failure
        - field: event.category
          operator: contains
          value: authentication
        - field: host.os.platform
          operator: equals
          value: windows
    threshold:
      field: source.ip
      count: 20
      timeframe: 60

  - id: CN-WIN-CRED-009
    name: Mimikatz Command Line Detected
    description: A process command line matching known Mimikatz patterns was detected, indicating active credential theft tool usage.
    level: critical
    category: credential_access
    mitre_tactic: TA0006
    mitre_technique:
      - T1003.001
      - T1003.002
    enabled: true
    conditions:
      logic: and
      fields:
        - field: process.command_line
          operator: regex
          value: (?i)(mimikatz|sekurlsa|kerberos::list|lsadump::sam|privilege::debug|token::elevate|sekurlsa::logonpasswords)
        - field: host.os.platform
          operator: equals
          value: windows
