app = "cybernest-siem"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.prod"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 250

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
